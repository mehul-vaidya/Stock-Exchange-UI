    </div>
  </div>

  <div class="dashboard">
    <div class="chart-grid">
      <div class="chart-card" *ngFor="let s of ['AA','BB','CC','DD']">
        <h3>{{ s }}</h3>
        <canvas [id]="s + '-chart'"></canvas>
      </div>
    </div>

    <!-- Order Panel -->
    <div class="order-panel">
      <select [(ngModel)]="selectedStock">
        <option *ngFor="let s of ['AA','BB','CC','DD']" [value]="s">
          {{ s }}
        </option>
      </select>

      <select [(ngModel)]="orderType">
        <option value="BUY">Buy</option>
        <option value="SELL">Sell</option>
      </select>

      <input type="number" placeholder="Price" [(ngModel)]="orderPrice" />

      <button (click)="submitOrder()">Submit</button>
    </div>
  </div>
